name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            komelia-epub-reader/ttu-ebook-reader/package-lock.json
            komelia-epub-reader/komga-webui/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install epub reader dependencies
        run: |
          npm --prefix komelia-epub-reader/ttu-ebook-reader ci
          npm --prefix komelia-epub-reader/komga-webui ci

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run i18n audits and build checks
        run: |
          ./gradlew \
            auditLocaleAssets \
            auditUiStrings \
            auditI18nBypass \
            :komelia-ui:compileKotlinJvm \
            buildWebui \
            :komelia-komf-extension:app:assembleExtension \
            --no-configuration-cache \
            --no-daemon \
            --console=plain

      - name: Run ttu-ebook-reader checks
        run: npm --prefix komelia-epub-reader/ttu-ebook-reader run check
