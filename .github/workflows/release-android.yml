name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag and release version, for example v0.18.4-yexi.3
        required: true
        type: string
      release_name:
        description: Release title, leave empty to reuse the tag
        required: false
        default: ""
        type: string
      prerelease:
        description: Publish as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-android-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      APK_NAME: komelia-app-${{ inputs.tag }}-arm64-v8a.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            komelia-epub-reader/ttu-ebook-reader/package-lock.json
            komelia-epub-reader/komga-webui/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install epub reader dependencies
        run: |
          npm --prefix komelia-epub-reader/ttu-ebook-reader ci
          npm --prefix komelia-epub-reader/komga-webui ci

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          KOMELIA_RELEASE_KEYSTORE_BASE64: ${{ secrets.KOMELIA_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KOMELIA_RELEASE_KEYSTORE_BASE64}" ]; then
            echo "Missing secret: KOMELIA_RELEASE_KEYSTORE_BASE64" >&2
            exit 1
          fi
          echo "${KOMELIA_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/komelia-release.jks"

      - name: Build arm64-v8a release APK
        env:
          KOMELIA_RELEASE_STORE_FILE: ${{ runner.temp }}/komelia-release.jks
          KOMELIA_RELEASE_STORE_PASSWORD: ${{ secrets.KOMELIA_RELEASE_STORE_PASSWORD }}
          KOMELIA_RELEASE_KEY_ALIAS: ${{ secrets.KOMELIA_RELEASE_KEY_ALIAS }}
          KOMELIA_RELEASE_KEY_PASSWORD: ${{ secrets.KOMELIA_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew \
            auditLocaleAssets \
            auditUiStrings \
            auditI18nBypass \
            buildWebui \
            :komelia-app:assembleRelease \
            -Pkomelia.android.abi=arm64-v8a \
            -Pkomelia.android.skipJniVerification=true \
            --no-configuration-cache \
            --no-daemon \
            --console=plain

      - name: Prepare release asset
        run: |
          mkdir -p build/verified-apks
          cp komelia-app/build/outputs/apk/release/komelia-app-release.apk "build/verified-apks/${APK_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-arm64-v8a
          path: build/verified-apks/${{ env.APK_NAME }}
          if-no-files-found: error

      - name: Resolve release title
        id: release_name
        run: |
          if [ -n "${{ inputs.release_name }}" ]; then
            echo "value=${{ inputs.release_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ steps.release_name.outputs.value }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: build/verified-apks/${{ env.APK_NAME }}
